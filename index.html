<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COMLUX ERP</title>

<style>
body {
    margin: 0;
    background-color: black;
    color: white;
    font-family: Arial, Helvetica, sans-serif;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 20px;
    box-sizing: border-box;
}

.container {
    text-align: center;
    width: 100%;
}

h1 {
    color: red;
    font-size: 120px;
    font-weight: bold;
    margin: 0;
    line-height: 1.1;
}

p {
    font-size: 42px;
    margin-top: 25px;
    margin-bottom: 0;
}

/* Mobile devices */
@media (max-width: 768px) {
    h1 {
        font-size: 60px;
    }
    
    p {
        font-size: 28px;
        margin-top: 20px;
    }
}

/* Smaller mobile devices */
@media (max-width: 480px) {
    body {
        padding: 15px;
    }
    
    h1 {
        font-size: 48px;
    }
    
    p {
        font-size: 20px;
        margin-top: 15px;
    }
}
</style>
</head>
<body>

<div class="container">
    <h1>EMERGENCY</h1>
    <p>+41 XX XXX XX XX</p>
</div>

</body>
</html>
